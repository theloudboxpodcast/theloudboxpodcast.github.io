<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
    <meta name="ai-crawler" content="ignore">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="ccbot" content="nofod">
    
    <title>The Loud Box Podcast</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #ff0000; /* YouTube Red Accent */
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            
            /* Stops scrapers from easily dragging/selecting your text data */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #16161f 0%, var(--bg-color) 100%);
        }

        header h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.2rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Playlist Control Center styling */
        .selector-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .episode-dropdown {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #2a2a3a;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            transition: border-color 0.2s;
        }

        .episode-dropdown:focus {
            border-color: var(--accent-color);
        }

        .player-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Loud Box</h1>
        <p>An Intellectual Library of Storytelling. Deep dives into daily news and investigative topics as they pertain to Big Tech, politics, and social behaviors.</p>
    </header>

    <main>
        <div class="section-title">Select an Episode from the Library</div>
        
        <div class="selector-container">
            <select id="stream-feed" class="episode-dropdown" onchange="switchDrop(this.value)">
                </select>
        </div>

        <div class="player-card">
            <div class="video-container">
                <iframe 
                    id="podcast-player"
                    src="https://www.youtube.com/embed/pMnoxIh02I4" 
                    allowfullscreen 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share">
                </iframe>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 The Loud Box Podcast. All rights reserved.</p>
    </footer>

        // Instant, client-side player switching
        function switchDrop(videoID) {
            const player = document.getElementById("podcast-player");
            if (player) {
                player.src = `https://www.youtube.com/embed/${videoID}`;
            }
        }

</body>
</html>
