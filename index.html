<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Loud Box Podcast</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #1DB954; /* Spotify Green Accent */
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #16161f 0%, var(--bg-color) 100%);
        }

        header h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.2rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin: 0;
        }

        .btn-platform {
            background-color: var(--accent-color);
            color: #000000;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-platform:hover {
            transform: scale(1.05);
        }

        .player-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a3a;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Loud Box</h1>
        <p>An Intellectual Library of Storytelling. Deep dives into daily news and investigative topics as they pertain to Big Tech, politics, and social behaviors.</p>
    </header>

    <main>
        <div class="section-header">
            <h2 class="section-title">Latest Episodes</h2>
            <a href="https://open.spotify.com" target="_blank" class="btn-platform">Listen on Spotify</a>
        </div>

        <div class="player-card">
            <iframe 
                src="https://open.spotify.com/embed/show/4Nn08A89M8w36Bv9M2S46V?utm_source=generator&theme=0" 
                width="100%" 
                height="352" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy"
                style="border-radius: 12px;">
            </iframe>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 The Loud Box Podcast. All rights reserved.</p>
    </footer>

</body>
</html>
