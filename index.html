<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Loud Box Podcast</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #ff3e3e;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #16161f 0%, var(--bg-color) 100%);
        }

        header h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.2rem;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin: 0;
        }

        .btn-youtube {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-youtube:hover {
            opacity: 0.9;
        }

        /* Responsive Video Layout Grid */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        .episode-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent-color);
        }

        .episode-card h3 {
            margin: 0 0 1rem 0;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            border-radius: 8px;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Loud Box</h1>
        <p>An Intellectual Library of Storytelling. Deep dives into daily news and investigative topics as they pertain to Big Tech, politics, and social behaviors.</p>
    </header>

    <main>
        <div class="section-header">
            <h2 class="section-title">Featured Drops</h2>
            <a href="https://www.youtube.com/channel/UC_a4g8g-I72zH-7b7qE8ySg" target="_blank" class="btn-youtube">Subscribe on YouTube</a>
        </div>

        <div class="video-grid">
            
            <div class="episode-card">
                <h3>America vs. China: The New Cold War</h3>
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                        title="America vs China" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 The Loud Box Podcast. All rights reserved.</p>
    </footer>

</body>
</html>
