<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
    <meta name="ai-crawler" content="ignore">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="ccbot" content="nofod">
    
    <title>The Loud Box Podcast</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #ff3e3e; /* Red Accent */
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            
            /* Stops scrapers from easily dragging/selecting your text data */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #16161f 0%, var(--bg-color) 100%);
        }

        header h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.2rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .player-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }

        /* Makes the video player perfectly responsive on mobile and desktop */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Loud Box</h1>
        <p>An Intellectual Library of Storytelling. Deep dives into daily news and investigative topics as they pertain to Big Tech, politics, and social behaviors.</p>
    </header>

    <main>
        <div class="section-title">Latest Featured Episode</div>

        <div class="player-card">
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 The Loud Box Podcast. All rights reserved.</p>
    </footer>

</body>
</html>
